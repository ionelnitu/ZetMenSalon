<footer>

  <!-- Rândul 1: Logo + Copyright -->
  <div class="footer-top">
    <div class="footer-brand">
      <p class="footer-logo">
        [<span class="zet">ZET</span><span class="men">MEN</span>]
      </p>
      <p class="footer-tagline">Male Image &amp; Grooming</p>
    </div>
    <div class="footer-copy">© {{ year }} ZETMEN. All rights reserved.<br> Zetmen SRL CUI: 54332491 Nr. Reg. J2026019579005</div>
  </div>

  <div class="footer-divider"></div>

  <!-- Rândul 2: Social + Legal + ANPC -->
  <div class="footer-bottom">

    <div class="footer-socials">
      @for (social of socials; track social.label) {
        <a [href]="social.href" target="_blank">{{ social.label }}</a>
      }
    </div>

    <div class="footer-legal">
      <a routerLink="/privacy">Confidențialitate</a>
      <span class="footer-sep">·</span>
      <button class="cookie-reset-btn" (click)="resetCookies()">
        Resetează cookie
      </button>
    </div>

    <div class="footer-anpc">
      <a href="https://anpc.ro/ce-este-sal/" target="_blank" rel="nofollow">
        <img
          src="https://etamade-com.github.io/anpc-sal-sol-logo/anpc-sal.svg"
          alt="Solutionarea Alternativa a Litigiilor"
        />
      </a>
      <a href="https://ec.europa.eu/consumers/odr" target="_blank" rel="nofollow">
        <img
          src="https://etamade-com.github.io/anpc-sal-sol-logo/anpc-sol.svg"
          alt="Solutionarea Online a Litigiilor"
        />
      </a>
    </div>

  </div>

</footer>
