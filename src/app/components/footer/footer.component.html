<footer>
  <div class="footer-logo">
    <p>[<span class="zet">ZET</span><span class="men">MEN</span>]</p>
    <p class="hero-tagline">Male Image & Grooming</p>
  </div>

  <div class="footer-copy">© {{ year }} ZETMEN. All rights reserved.</div>

  <div class="footer-bottom">
    <div class="footer-socials">
      @for (social of socials; track social.label) {
        <a [href]="social.href">{{ social.label }}</a>
      }
    </div>
<div class="footer-legal">
      <a routerLink="/privacy">Confidențialitate</a>
      <span class="footer-sep">·</span>
      <br>
      <button class="cookie-reset-btn" (click)="resetCookies()">
        Reset cookie.
      </button>
    </div>
  </div>
</footer>
